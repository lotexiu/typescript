name: 3 — Create release after merge

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    # Only runs on actual merge, and only if no-release label is absent
    if: |
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'no-release')

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      # ─── Read labels from merged PR ───────────────────────────────────────
      - name: Read version label from PR
        id: version_label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name)
            console.log('Merged PR labels:', labels)

            const type = labels.includes('major') ? 'major'
              : labels.includes('minor') ? 'minor'
              : 'patch' // safe fallback

            const buildPassed = labels.includes('build-passed')

            core.setOutput('type', type)
            core.setOutput('build_passed', buildPassed ? 'true' : 'false')
            console.log('Release type:', type)
            console.log('Build passed:', buildPassed)

      # ─── Get current version ──────────────────────────────────────────────
      - name: Get current version
        id: current
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Current version: ${VERSION}"

      # ─── Calculate next version ───────────────────────────────────────────
      - name: Calculate next version
        id: next
        run: |
          node -e "
            const [major, minor, patch] = '${{ steps.current.outputs.version }}'.split('.').map(Number)
            const type = '${{ steps.version_label.outputs.type }}'

            const next = type === 'major' ? \`\${major + 1}.0.0\`
              : type === 'minor' ? \`\${major}.\${minor + 1}.0\`
              : \`\${major}.\${minor}.\${patch + 1}\`

            console.log(next)
          " > /tmp/next.txt

          NEXT=$(cat /tmp/next.txt)
          echo "version=${NEXT}" >> $GITHUB_OUTPUT
          echo "Next version: ${NEXT}"

      # ─── Update package.json ──────────────────────────────────────────────
      - name: Bump version in package.json
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          node -e "
            const fs = require('fs')
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
            pkg.version = '${NEXT}'
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n')
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.next.outputs.version }}" || echo "Nothing to commit"
          git push origin master

      # ─── Collect commits from the merged PR ───────────────────────────────
      - name: Collect PR commits
        id: commits
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            })

            const lines = commits.map(c => {
              const short = c.sha.substring(0, 7)
              const msg = c.commit.message.split('\n')[0]
              return `- \`${short}\` ${msg}`
            })

            core.setOutput('body', lines.join('\n'))
            core.setOutput('count', commits.length)

      # ─── Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.next.outputs.version }}'
            const type = '${{ steps.version_label.outputs.type }}'
            const buildPassed = '${{ steps.version_label.outputs.build_passed }}' === 'true'
            const prTitle = context.payload.pull_request.title
            const commitCount = '${{ steps.commits.outputs.count }}'
            const commitBody = `${{ steps.commits.outputs.body }}`

            const typeEmoji = { major: '🚨', minor: '✨', patch: '🔧' }[type] ?? '📦'
            const buildLine = buildPassed
              ? '✅ Build passed'
              : '❌ Build failed — released for reference'

            const body = [
              `${buildLine}`,
              `**Type:** ${typeEmoji} \`${type}\``,
              '',
              `### Commits (${commitCount})`,
              '',
              commitBody,
            ].join('\n')

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `${version}: ${prTitle}`,
              body,
              prerelease: !buildPassed,
              draft: false,
            })

            console.log('Release created:', release.html_url)
