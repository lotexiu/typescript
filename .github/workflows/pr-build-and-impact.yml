name: PR — Build & Impact

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-impact:
    name: Build all & detect impact
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ─── Checkout do pacote do PR ─────────────────────────────────────────
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: package-under-test

      - name: Get package info
        id: pkg
        working-directory: package-under-test
        run: |
          PKG_NAME=$(node -e "console.log(require('./package.json').name)")
          echo "name=${PKG_NAME}" >> $GITHUB_OUTPUT
          echo "Package: ${PKG_NAME}"

      # ─── Clone monorepo ───────────────────────────────────────────────────
      - name: Clone aleph-typescript
        run: |
          git clone https://github.com/lotexiu/aleph-typescript.git monorepo

      # ─── pnpm start (git-sync + install + approve-builds) ────────────────
      # Replica exatamente o que você faz localmente
      - name: Run pnpm start (git-sync + install + approve-builds)
        working-directory: monorepo
        run: |
          # git-init
          git submodule update --init --recursive

          # git-sub-branch: cada submodule vai para sua branch principal
          git submodule foreach '
            branch=$(git symbolic-ref --short -q refs/remotes/origin/HEAD 2>/dev/null || echo "refs/remotes/origin/master")
            branch=${branch#refs/remotes/origin/}
            git checkout $branch 2>/dev/null || git checkout master 2>/dev/null || git checkout main 2>/dev/null
          '

          # git-sub-update
          git submodule update --remote --recursive

          # git pull no monorepo
          git pull origin master 2>/dev/null || git pull origin main 2>/dev/null || true

          # pnpm i + approve-builds
          pnpm install --no-frozen-lockfile
          pnpm approve-builds --all 2>/dev/null || true
          pnpm install --no-frozen-lockfile

      # ─── Substitui o submodule pelo código do PR ──────────────────────────
      - name: Replace package with PR code
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"

          MATCH=$(find monorepo/packages -name "package.json" \
            -not -path "*/node_modules/*" | \
            xargs grep -l "\"name\": \"${PKG_NAME}\"" | head -1)

          if [ -z "$MATCH" ]; then
            echo "❌ Package '${PKG_NAME}' not found in monorepo/packages"
            exit 1
          fi

          PKG_DIR=$(dirname "$MATCH")
          echo "pkg_dir=${PKG_DIR}" >> $GITHUB_ENV
          echo "Found at: ${PKG_DIR}"

          rsync -a --exclude='.git' package-under-test/ "${PKG_DIR}/"
          echo "✅ Replaced with PR code"

      # ─── Descobre quais projetos dependem do pacote ───────────────────────
      - name: Detect dependent projects
        id: dependents
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"

          # Busca todos os package.json no monorepo (packages + apps)
          # e verifica quais têm o pacote como workspace:*
          DEPENDENTS=$(find monorepo -name "package.json" \
            -not -path "*/node_modules/*" \
            -not -path "monorepo/package.json" | \
            xargs grep -l "\"${PKG_NAME}\"" 2>/dev/null | \
            while read f; do
              # Pega o name do projeto dependente
              node -e "
                const pkg = require('$f');
                const deps = { ...pkg.dependencies, ...pkg.devDependencies };
                if (deps['${PKG_NAME}'] && deps['${PKG_NAME}'].includes('workspace')) {
                  console.log(pkg.name);
                }
              " 2>/dev/null
            done | tr '\n' ',' | sed 's/,$//')

          echo "list=${DEPENDENTS}" >> $GITHUB_OUTPUT
          echo "Dependent projects: ${DEPENDENTS:-none}"

      # ─── Build de tudo ────────────────────────────────────────────────────
      # Roda pnpm build em todos os projetos e salva o resultado de cada um
      - name: Build all projects
        id: build_all
        working-directory: monorepo
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"
          DEPENDENTS="${{ steps.dependents.outputs.list }}"

          # Resultado do build do pacote correspondente
          PKG_BUILD_STATUS="passed"
          # Lista de dependentes que falharam
          FAILED_DEPENDENTS=""

          set +e
          BUILD_OUTPUT=$(pnpm build 2>&1)
          set -e

          echo "$BUILD_OUTPUT"

          # Analisa o output linha por linha para detectar falhas por projeto
          # pnpm build outputa: "packages/xxx build: Failed" ou "ERR_PNPM_RECURSIVE_RUN_FIRST_FAIL @scope/name"
          while IFS= read -r line; do
            # Detecta falha do pacote correspondente
            if echo "$line" | grep -q "${PKG_NAME}.*Failed\|ERR.*${PKG_NAME}"; then
              PKG_BUILD_STATUS="failed"
            fi

            # Detecta falha em dependentes
            if [ -n "$DEPENDENTS" ]; then
              echo "$DEPENDENTS" | tr ',' '\n' | while read -r DEP; do
                if [ -n "$DEP" ] && echo "$line" | grep -q "${DEP}.*Failed\|ERR.*${DEP}"; then
                  echo "${DEP}" >> /tmp/failed_deps.txt
                fi
              done
            fi
          done <<< "$BUILD_OUTPUT"

          # Remove duplicatas
          FAILED_DEPENDENTS=""
          if [ -f /tmp/failed_deps.txt ]; then
            FAILED_DEPENDENTS=$(sort -u /tmp/failed_deps.txt | tr '\n' ',' | sed 's/,$//')
          fi

          echo "pkg_status=${PKG_BUILD_STATUS}" >> $GITHUB_OUTPUT
          echo "failed_dependents=${FAILED_DEPENDENTS}" >> $GITHUB_OUTPUT
          echo "Package build: ${PKG_BUILD_STATUS}"
          echo "Failed dependents: ${FAILED_DEPENDENTS:-none}"

      # ─── Conta linhas alteradas via API do PR ─────────────────────────────
      - name: Count changed lines
        id: lines
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            })
            const total = pr.additions + pr.deletions
            core.setOutput('total', String(total))
            console.log(`Lines changed: +${pr.additions} -${pr.deletions} = ${total}`)

      # ─── Ensure labels exist ──────────────────────────────────────────────
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'build-passed', color: '2EA043', description: 'Package build succeeded' },
              { name: 'build-failed', color: 'D73A4A', description: 'Package build failed' },
              { name: 'major',        color: 'B60205', description: 'Breaking change — dependent app build failed' },
              { name: 'minor',        color: '0075CA', description: '30+ lines changed' },
              { name: 'patch',        color: 'CFD3D7', description: 'Less than 30 lines changed' },
            ]
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                })
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  })
                }
              }
            }

      # ─── Aplica labels de build e impacto ────────────────────────────────
      - name: Apply build and impact labels
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const pkgStatus = '${{ steps.build_all.outputs.pkg_status }}'
            const failedDependents = '${{ steps.build_all.outputs.failed_dependents }}'
            const linesChanged = parseInt('${{ steps.lines.outputs.total }}') || 0

            // ── Determina labels a adicionar e remover ──────────────────
            const toAdd = []
            const toRemove = []

            // Build label
            if (pkgStatus === 'passed') {
              toAdd.push('build-passed')
              toRemove.push('build-failed')
            } else {
              toAdd.push('build-failed')
              toRemove.push('build-passed')
            }

            // Impact label — só aplica se o build do pacote passou
            // e o dev não colocou uma label manualmente
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const labelNames = currentLabels.map(l => l.name)
            const devSetVersion = ['major','minor','patch'].some(l => labelNames.includes(l))

            if (!devSetVersion) {
              if (pkgStatus === 'failed') {
                // build do pacote falhou — não coloca impacto ainda
                toRemove.push('major', 'minor', 'patch')
              } else if (failedDependents) {
                // dependente falhou = major
                toAdd.push('major')
                toRemove.push('minor', 'patch')
              } else if (linesChanged >= 30) {
                toAdd.push('minor')
                toRemove.push('major', 'patch')
              } else {
                toAdd.push('patch')
                toRemove.push('major', 'minor')
              }
            }

            // Remove labels
            for (const label of [...new Set(toRemove)]) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: label,
                })
              } catch (e) {}
            }

            // Adiciona labels (filtra as que já estão)
            const toAddFiltered = toAdd.filter(l => !labelNames.includes(l))
            if (toAddFiltered.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: toAddFiltered,
              })
            }

            console.log('Added:', toAddFiltered)
            console.log('Removed:', toRemove)

      # ─── Comentário de resultado ──────────────────────────────────────────
      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const pkgStatus = '${{ steps.build_all.outputs.pkg_status }}'
            const failedDeps = '${{ steps.build_all.outputs.failed_dependents }}'
            const linesChanged = '${{ steps.lines.outputs.total }}'
            const pkgName = '${{ steps.pkg.outputs.name }}'
            const dependents = '${{ steps.dependents.outputs.list }}'
            const buildIcon = pkgStatus === 'passed' ? '✅' : '❌'

            const failedList = failedDeps
              ? failedDeps.split(',').map(d => `  - \`${d}\``).join('\n')
              : null

            const depList = dependents
              ? dependents.split(',').map(d => `\`${d}\``).join(', ')
              : '_none_'

            const body = [
              `### ${buildIcon} Build ${pkgStatus} — \`${pkgName}\``,
              '',
              `| | |`,
              `|---|---|`,
              `| **Package build** | ${buildIcon} ${pkgStatus} |`,
              `| **Lines changed** | ${linesChanged} |`,
              `| **Dependent projects** | ${depList} |`,
              failedList ? `| **Failed dependents** | ❌ see below |` : `| **Failed dependents** | ✅ none |`,
              '',
              failedList ? `**Failed dependent builds:**\n${failedList}` : '',
              '',
              '_Re-runs automatically on every push to this PR._',
            ].filter(l => l !== '').join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Build ')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
