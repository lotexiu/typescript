name: PR - Merge Actions

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled, closed]
    branches: [master]

permissions:
  contents: write
  pull-requests: read

jobs:
  merge-gate:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Validate merge requirements
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((l) => l.name);
            const hasBuildPassed = labels.includes('build-passed');
            const hasBuildFailed = labels.includes('build-failed');

            if (!hasBuildPassed || hasBuildFailed) {
              core.setFailed('Merge blocked: requires label build-passed and must not contain build-failed.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const changed = files.map((f) => f.filename);
            if (!changed.includes('.changes/pr-analysis.json')) {
              core.setFailed('Merge blocked: .changes/pr-analysis.json is missing in this PR.');
              return;
            }
            if (!changed.includes('.changes/CHANGELOG.md')) {
              core.setFailed('Merge blocked: .changes/CHANGELOG.md is missing in this PR.');
              return;
            }
            if (!changed.includes('.changes/TAG_NOTES.md')) {
              core.setFailed('Merge blocked: .changes/TAG_NOTES.md is missing in this PR.');
              return;
            }

  bump-version-and-tag:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Resolve release metadata from PR labels
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((l) => l.name);
            const impact = labels.includes('major') ? 'major' : labels.includes('minor') ? 'minor' : 'patch';
            const build = labels.includes('build-passed') ? 'build-passed' : 'build-failed';
            const test = labels.includes('test') ? 'true' : 'false';

            const pr = context.payload.pull_request;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const reviewers = [...new Set(reviews.map((r) => r.user?.login).filter(Boolean))];
            const approvers = [...new Set(reviews.filter((r) => r.state === 'APPROVED').map((r) => r.user?.login).filter(Boolean))];
            const commitOwners = [...new Set(commits.map((c) => c.author?.login || c.commit?.author?.name).filter(Boolean))];

            core.setOutput('pr_title', pr.title || 'n/a');
            core.setOutput('pr_url', pr.html_url || 'n/a');
            core.setOutput('pr_owner', pr.user?.login || 'unknown');
            core.setOutput('pr_created_at', pr.created_at || 'n/a');
            core.setOutput('pr_merged_at', pr.merged_at || 'n/a');
            core.setOutput('reviewers', reviewers.length ? reviewers.join(', ') : 'none');
            core.setOutput('approvers', approvers.length ? approvers.join(', ') : 'none');
            core.setOutput('commit_owners', commitOwners.length ? commitOwners.join(', ') : 'none');

            core.setOutput('impact', impact);
            core.setOutput('build', build);
            core.setOutput('test', test);
            core.setOutput('pr_number', String(context.payload.pull_request.number));

      - name: Bump package.json version
        id: bump
        env:
          IMPACT: ${{ steps.meta.outputs.impact }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const [major, minor, patch] = String(pkg.version || '0.0.0').split('.').map((x) => parseInt(x, 10));
          const impact = process.env.IMPACT;

          const next = impact === 'major'
            ? `${major + 1}.0.0`
            : impact === 'minor'
              ? `${major}.${minor + 1}.0`
              : `${major}.${minor}.${patch + 1}`;

          pkg.version = next;
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          console.log(next);
          NODE

          NEXT_VERSION=$(node -p "require('./package.json').version")
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.next }}" || true
          git push origin master

      - name: Create and push release tag
        env:
          NEXT_VERSION: ${{ steps.bump.outputs.next }}
          IMPACT: ${{ steps.meta.outputs.impact }}
          BUILD: ${{ steps.meta.outputs.build }}
          TEST: ${{ steps.meta.outputs.test }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          PR_URL: ${{ steps.meta.outputs.pr_url }}
          PR_OWNER: ${{ steps.meta.outputs.pr_owner }}
          PR_CREATED_AT: ${{ steps.meta.outputs.pr_created_at }}
          PR_MERGED_AT: ${{ steps.meta.outputs.pr_merged_at }}
          PR_REVIEWERS: ${{ steps.meta.outputs.reviewers }}
          PR_APPROVERS: ${{ steps.meta.outputs.approvers }}
          COMMIT_OWNERS: ${{ steps.meta.outputs.commit_owners }}
        run: |
          TAG="v${NEXT_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          TAG_NOTES_PATH=".changes/TAG_NOTES.md"
          CHANGELOG_PATH=".changes/CHANGELOG.md"

          {
            echo "# ${TAG}"
            echo
            echo "## Release Snapshot"
            echo "- Impact: ${IMPACT}"
            echo "- Build: ${BUILD}"
            echo "- Test: ${TEST}"
            echo
            echo "## PR Context"
            echo "- PR: #${PR_NUMBER}"
            echo "- Title: ${PR_TITLE}"
            echo "- URL: ${PR_URL}"
            echo "- PR date: ${PR_CREATED_AT}"
            echo "- PR merged at: ${PR_MERGED_AT}"
            echo "- PR owner: ${PR_OWNER}"
            echo "- Reviewers: ${PR_REVIEWERS}"
            echo "- Approvers: ${PR_APPROVERS}"
            echo "- Commit owners: ${COMMIT_OWNERS}"
            echo
            if [ -f "$TAG_NOTES_PATH" ]; then
              echo "## Tag Digest"
              sed -n '1,160p' "$TAG_NOTES_PATH"
              echo
            fi
            if [ -f "$CHANGELOG_PATH" ]; then
              echo "## Changelog Preview"
              sed -n '1,120p' "$CHANGELOG_PATH"
              echo
            fi
            echo "## Machine Metadata"
            echo "META_PR_NUMBER=${PR_NUMBER}"
            echo "META_IMPACT=${IMPACT}"
            echo "META_BUILD=${BUILD}"
            echo "META_TEST=${TEST}"
          } > /tmp/tag-message.txt

          git tag -a "$TAG" -F /tmp/tag-message.txt
          git push origin "$TAG"
