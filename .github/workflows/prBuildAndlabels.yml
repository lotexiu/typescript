name: 2 — PR build and labels

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-label:
    name: Build package and manage labels
    runs-on: ubuntu-latest

    steps:
      # ─── Detect package name ──────────────────────────────────────────────
      # Faz checkout do pacote para descobrir o nome dele
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: package-under-test

      - name: Get package name
        id: pkg
        working-directory: package-under-test
        run: |
          PKG_NAME=$(node -e "console.log(require('./package.json').name)")
          echo "name=${PKG_NAME}" >> $GITHUB_OUTPUT
          echo "Package: ${PKG_NAME}"

      # ─── Clone monorepo raiz com todos os submodules ──────────────────────
      # Necessário para resolver dependências workspace:* entre pacotes
      - name: Checkout aleph-typescript monorepo
        uses: actions/checkout@v4
        with:
          repository: lotexiu/aleph-typescript
          path: monorepo
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Substituir o pacote no monorepo pelo código do PR ───────────────
      - name: Replace package in monorepo with PR code
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"

          # Descobre o caminho do pacote dentro do monorepo pelo package.json
          MATCH=$(find monorepo/packages -name "package.json" -not -path "*/node_modules/*" | xargs grep -l "\"name\": \"${PKG_NAME}\"" | head -1)

          if [ -z "$MATCH" ]; then
            echo "❌ Package '${PKG_NAME}' not found in monorepo/packages"
            exit 1
          fi

          PKG_DIR=$(dirname "$MATCH")
          echo "Found package at: ${PKG_DIR}"

          # Substitui o conteúdo pelo código do PR (preserva o .git do submodule)
          rsync -a --exclude='.git' package-under-test/ "${PKG_DIR}/"
          echo "✅ Package replaced with PR code"

      # ─── Setup e install no monorepo ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies (monorepo context)
        working-directory: monorepo
        run: pnpm install --no-frozen-lockfile

      # ─── Ensure labels exist ──────────────────────────────────────────────
      - name: Ensure required labels exist in repo
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'build-passed', color: '2EA043', description: 'Package build succeeded' },
              { name: 'build-failed', color: 'D73A4A', description: 'Package build failed' },
              { name: 'major',        color: 'B60205', description: 'Breaking change — bumps major version' },
              { name: 'minor',        color: '0075CA', description: 'New features — bumps minor version' },
              { name: 'patch',        color: 'CFD3D7', description: 'Small fix — bumps patch version' },
              { name: 'no-release',   color: 'EDEDED', description: 'Merge without creating a release' },
            ]

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                })
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  })
                }
              }
            }

      # ─── Run build no contexto do monorepo ────────────────────────────────
      # O sufixo "..." no --filter faz o pnpm buildar as dependências
      # do pacote na ordem correta antes de buildar o pacote alvo.
      - name: Build package and its dependencies
        id: build
        working-directory: monorepo
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"

          set +e
          pnpm --filter "${PKG_NAME}..." build 2>&1
          BUILD_EXIT=$?
          set -e

          if [ $BUILD_EXIT -eq 0 ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Build passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Build failed"
          fi

      # ─── Apply build result label ─────────────────────────────────────────
      - name: Apply build result label
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const buildStatus = '${{ steps.build.outputs.status }}'

            const toRemove = buildStatus === 'passed' ? 'build-failed' : 'build-passed'
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: toRemove,
              })
            } catch (e) { /* label wasn't there, fine */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [buildStatus === 'passed' ? 'build-passed' : 'build-failed'],
            })

      # ─── Count changed lines ──────────────────────────────────────────────
      - name: Count lines changed vs master
        id: lines
        working-directory: package-under-test
        run: |
          ADDED=$(git diff --shortstat origin/master...HEAD 2>/dev/null | grep -oP '\d+(?= insertion)' || echo "0")
          DELETED=$(git diff --shortstat origin/master...HEAD 2>/dev/null | grep -oP '\d+(?= deletion)' || echo "0")
          TOTAL=$((ADDED + DELETED))
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "Lines changed: ${TOTAL}"

      # ─── Apply version bump label ─────────────────────────────────────────
      # Regras:
      # - Se o dev colocou major/minor/patch → respeita e remove apenas as conflitantes
      # - Se o dev não colocou nenhuma → aplica o padrão por linhas alteradas
      # - Nunca remove a label que o dev acabou de adicionar
      - name: Apply default version label if none set by developer
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const linesChanged = parseInt('${{ steps.lines.outputs.total }}') || 0
            const eventLabel = context.payload.label?.name ?? null
            const eventAction = context.eventName === 'pull_request'
              ? context.payload.action
              : null

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const labelNames = currentLabels.map(l => l.name)

            const VERSION_LABELS = ['major', 'minor', 'patch']
            const devSetMajor = labelNames.includes('major')
            const devSetMinor = labelNames.includes('minor')
            const devSetPatch = labelNames.includes('patch')
            const devHasVersionLabel = devSetMajor || devSetMinor || devSetPatch

            console.log('Event action:', eventAction)
            console.log('Event label:', eventLabel)
            console.log('Current labels:', labelNames)
            console.log('Lines changed:', linesChanged)

            if (devHasVersionLabel) {
              // Dev has a version label — figure out which one is the "chosen" one.
              // Priority: the label that triggered this run (if it's a version label),
              // otherwise whichever version label is present.
              let chosen = null
              if (eventAction === 'labeled' && VERSION_LABELS.includes(eventLabel)) {
                chosen = eventLabel
              } else if (devSetMajor) {
                chosen = 'major'
              } else if (devSetMinor) {
                chosen = 'minor'
              } else {
                chosen = 'patch'
              }

              // Remove all version labels except the chosen one
              const toRemove = VERSION_LABELS.filter(l => l !== chosen && labelNames.includes(l))
              for (const label of toRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    name: label,
                  })
                  console.log(`Removed conflicting label: ${label}`)
                } catch (e) { /* already removed */ }
              }

              console.log(`Developer label '${chosen}' respected.`)
              return
            }

            // No version label — apply default based on lines changed
            const defaultLabel = linesChanged >= 200 ? 'minor' : 'patch'
            const oppositeLabel = defaultLabel === 'minor' ? 'patch' : 'minor'

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: oppositeLabel,
              })
            } catch (e) { /* fine */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [defaultLabel],
            })

            console.log(`Applied default label: ${defaultLabel} (${linesChanged} lines changed)`)

      # ─── Post summary comment ─────────────────────────────────────────────
      - name: Post build summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const buildStatus = '${{ steps.build.outputs.status }}'
            const linesChanged = '${{ steps.lines.outputs.total }}'
            const icon = buildStatus === 'passed' ? '✅' : '❌'

            const body = [
              `### ${icon} Build ${buildStatus}`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Build** | ${icon} ${buildStatus} |`,
              `| **Lines changed** | ${linesChanged} |`,
              `| **Default label** | ${parseInt(linesChanged) >= 200 ? '`minor`' : '`patch`'} _(overridable by adding \`major\`, \`minor\` or \`patch\` manually)_ |`,
              '',
              '_Re-runs automatically on every push to this PR._',
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const botComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Build ')
            )

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
