name: 2 — PR build and labels

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-label:
    name: Build package and manage labels
    runs-on: ubuntu-latest

    steps:
      # ─── Setup ferramentas ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ─── Checkout do pacote (para descobrir o nome e contar linhas) ───────
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: package-under-test

      - name: Get package name
        id: pkg
        working-directory: package-under-test
        run: |
          PKG_NAME=$(node -e "console.log(require('./package.json').name)")
          echo "name=${PKG_NAME}" >> $GITHUB_OUTPUT
          echo "Package: ${PKG_NAME}"

      # ─── Clone monorepo e inicializa submodules ───────────────────────────
      # Replica exatamente: git clone → pnpm git-init
      - name: Checkout aleph-typescript monorepo
        uses: actions/checkout@v4
        with:
          repository: lotexiu/aleph-typescript
          path: monorepo
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Init submodules (pnpm git-init equivalent)
        working-directory: monorepo
        run: git submodule update --init --recursive

      # ─── Substitui o submodule do pacote pelo código do PR ───────────────
      - name: Replace package with PR code
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"

          MATCH=$(find monorepo/packages -name "package.json" \
            -not -path "*/node_modules/*" | \
            xargs grep -l "\"name\": \"${PKG_NAME}\"" | head -1)

          if [ -z "$MATCH" ]; then
            echo "❌ Package '${PKG_NAME}' not found in monorepo/packages"
            exit 1
          fi

          PKG_DIR=$(dirname "$MATCH")
          echo "Found at: ${PKG_DIR}"

          rsync -a --exclude='.git' package-under-test/ "${PKG_DIR}/"
          echo "✅ Replaced with PR code"

      # ─── Install com @swc/core aprovado ───────────────────────────────────
      # @swc/core requer aprovação para rodar build scripts.
      # Sem ele o Node não consegue processar arquivos .ts diretamente
      # (causa o ERR_UNKNOWN_FILE_EXTENSION ".ts").
      - name: Install dependencies
        working-directory: monorepo
        run: |
          pnpm install --no-frozen-lockfile
          pnpm approve-builds --all 2>/dev/null || true
          pnpm install --no-frozen-lockfile

      # ─── Ensure labels exist ──────────────────────────────────────────────
      - name: Ensure required labels exist in repo
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'build-passed', color: '2EA043', description: 'Package build succeeded' },
              { name: 'build-failed', color: 'D73A4A', description: 'Package build failed' },
              { name: 'major',        color: 'B60205', description: 'Breaking change — bumps major version' },
              { name: 'minor',        color: '0075CA', description: 'New features — bumps minor version' },
              { name: 'patch',        color: 'CFD3D7', description: 'Small fix — bumps patch version' },
              { name: 'no-release',   color: 'EDEDED', description: 'Merge without creating a release' },
            ]
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                })
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  })
                }
              }
            }

      # ─── Build do pacote ──────────────────────────────────────────────────
      - name: Build package
        id: build
        working-directory: monorepo
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"

          set +e
          pnpm --filter "${PKG_NAME}" build 2>&1
          BUILD_EXIT=$?
          set -e

          if [ $BUILD_EXIT -eq 0 ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Build passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Build failed"
          fi

      # ─── Apply build result label ─────────────────────────────────────────
      - name: Apply build result label
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const buildStatus = '${{ steps.build.outputs.status }}'

            const toRemove = buildStatus === 'passed' ? 'build-failed' : 'build-passed'
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: toRemove,
              })
            } catch (e) { /* label wasn't there, fine */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [buildStatus === 'passed' ? 'build-passed' : 'build-failed'],
            })

      # ─── Count changed lines ──────────────────────────────────────────────
      - name: Count lines changed vs master
        id: lines
        working-directory: package-under-test
        run: |
          ADDED=$(git diff --shortstat origin/master...HEAD 2>/dev/null | grep -oP '\d+(?= insertion)' || echo "0")
          DELETED=$(git diff --shortstat origin/master...HEAD 2>/dev/null | grep -oP '\d+(?= deletion)' || echo "0")
          TOTAL=$((ADDED + DELETED))
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "Lines changed: ${TOTAL}"

      # ─── Apply version label ──────────────────────────────────────────────
      # - Dev colocou major/minor/patch → respeita, remove conflitantes
      # - Nenhuma label de versão → aplica padrão por linhas alteradas
      # - Nunca remove a label que o dev acabou de adicionar
      - name: Apply version label
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const linesChanged = parseInt('${{ steps.lines.outputs.total }}') || 0
            const eventLabel = context.payload.label?.name ?? null
            const eventAction = context.payload.action ?? null

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const labelNames = currentLabels.map(l => l.name)

            const VERSION_LABELS = ['major', 'minor', 'patch']
            const hasVersion = VERSION_LABELS.some(l => labelNames.includes(l))

            console.log('Event:', eventAction, eventLabel)
            console.log('Labels:', labelNames)
            console.log('Lines changed:', linesChanged)

            if (hasVersion) {
              // Determina qual é a label escolhida pelo dev
              const chosen = (eventAction === 'labeled' && VERSION_LABELS.includes(eventLabel))
                ? eventLabel
                : VERSION_LABELS.find(l => labelNames.includes(l))

              // Remove apenas as conflitantes, nunca a escolhida
              for (const label of VERSION_LABELS.filter(l => l !== chosen)) {
                if (labelNames.includes(label)) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNumber,
                      name: label,
                    })
                    console.log(`Removed conflicting: ${label}`)
                  } catch (e) {}
                }
              }
              console.log(`Kept: ${chosen}`)
              return
            }

            // Nenhuma label de versão — aplica padrão por linhas alteradas
            const defaultLabel = linesChanged >= 200 ? 'minor' : 'patch'
            const opposite = defaultLabel === 'minor' ? 'patch' : 'minor'

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: opposite,
              })
            } catch (e) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [defaultLabel],
            })
            console.log(`Default applied: ${defaultLabel} (${linesChanged} lines)`)

      # ─── Post summary comment ─────────────────────────────────────────────
      - name: Post build summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const buildStatus = '${{ steps.build.outputs.status }}'
            const linesChanged = '${{ steps.lines.outputs.total }}'
            const icon = buildStatus === 'passed' ? '✅' : '❌'

            const body = [
              `### ${icon} Build ${buildStatus}`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Build** | ${icon} ${buildStatus} |`,
              `| **Lines changed** | ${linesChanged} |`,
              `| **Default label** | ${parseInt(linesChanged) >= 200 ? '`minor`' : '`patch`'} _(overridable by adding \`major\`, \`minor\` or \`patch\` manually)_ |`,
              '',
              '_Re-runs automatically on every push to this PR._',
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const botComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Build ')
            )

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
