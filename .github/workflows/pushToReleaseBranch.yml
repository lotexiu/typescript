name: 1 — Push to release branch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-to-release-branch:
    name: Create timestamped release branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate branch name from current timestamp
        id: branch
        run: |
          # Formato: {AA}{M}{DD}{HH}{mm}{ss}
          # Ex: 26320131045 = 20 de Março de 2026 às 13:10:45
          BRANCH_NAME=$(date -u +'%-y%-m%d%H%M%S')
          echo "name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "✅ Branch name: ${BRANCH_NAME}"

      - name: Create and push release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.name }}"
          git push origin "${{ steps.branch.outputs.name }}"
          echo "✅ Branch '${{ steps.branch.outputs.name }}' pushed successfully"
          echo ""
          echo "Now create a PR from '${{ steps.branch.outputs.name }}' → 'main' with your chosen title."
